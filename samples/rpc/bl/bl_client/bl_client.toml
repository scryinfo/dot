[log]
fileName = "log.log"
maxSize = 1024000
maxBackups = 3
maxAge = 7
compress = false
level = "info"
addStdOut = true
setSlog = true
[etcdClient]
endpoints = ["http://127.0.0.1:2379", "http://127.0.0.1:2378"]
# milliseconds
dialTimeout = 12000
[grpcClientEtcd]
name = "etcd://server/samples/rpc_bl"
