[connect_server]
addr = ':8092'
allow_credentials = true
allow_headers = []
allow_methods = ['GET', 'POST', 'OPTIONS']
allowed_origins = []
auto_run = true
http1 = true
http2 = true
max_concurrent_streams = 100
option_methods = true
read_timeout = 0
shutdown_timeout = 1024000
un_auth_urls = ['*']
unencrypted_http2 = true
write_timeout = 0

[connect_server.tls]
cert = ''
key = ''
mode = 'none'
peer_cert = ''
root_cert = ''

[connect_server_etcd]
addr = '127.0.0.1:8092'
name = 'server/samples/rpc_bl'
ttl = 10

[etcd_client]
dial_timeout = 12000
endpoints = ['http://127.0.0.1:2379', 'http://127.0.0.1:2378', 'http://127.0.0.1:2377']

[hi_service]
name = 'etcd3'

[log]
add_stdout = true
add_stdout_in_debug = false
compress = false
file_name = 'log.log'
level = 'info'
max_age = 7
max_backups = 3
max_size = 1024000
set_slog = true
