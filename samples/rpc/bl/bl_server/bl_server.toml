[log]
fileName = "log.log"
maxSize = 1024000
maxBackups = 3
maxAge = 7
compress = false
level = "info"
addStdOut = true
setSlog = true
[connectServerEtcd]
name = "server/samples/rpc_bl"
addr = "127.0.0.1:8090"
# seconds tls
# tls = 10
[hiService]
name = "etcd1"
[connectServer]
addr = ":8090"
readTimeout = 0
writeTimeout = 0
maxConcurrentStreams = 100
allowedOrigins = []
allowHeaders = []
allowMethods = ["GET", "POST", "OPTIONS"]
allowCredentials = true
unAuthUrls = ["*"]
optionMethods = true
shutdownTimeout = 1024000
http1 = true
http2 = true
unencryptedHTTP2 = true
[connectServer.tls]
mode = "none"
cert = ""
key = ""
rootCert = ""
serverCert = ""

[etcdClient]
endpoints = ["http://127.0.0.1:2379", "http://127.0.0.1:2378", "http://127.0.0.1:2377"]
# milliseconds
dialTimeout = 12000
