[[etcd_servers]]
name = 'etcd1'
dir = 'default.etcd1'
listen_client_urls = ['http://127.0.0.1:2379']
advertise_client_urls = ['http://127.0.0.1:2379']
listen_peer_urls = ['http://127.0.0.1:2380']
advertise_peer_urls = ['http://127.0.0.1:2380']
initial_cluster_token = 'ClusterToken'
initial_cluster = 'etcd1=http://127.0.0.1:2380,etcd2=http://127.0.0.1:2381,etcd3=http://127.0.0.1:2382'
log_level = 'info'
ready_notify_timeout = 0

[[etcd_servers]]
name = 'etcd2'
dir = 'default.etcd2'
listen_client_urls = ['http://127.0.0.1:2378']
advertise_client_urls = ['http://127.0.0.1:2378']
listen_peer_urls = ['http://127.0.0.1:2381']
advertise_peer_urls = ['http://127.0.0.1:2381']
initial_cluster_token = 'ClusterToken'
initial_cluster = 'etcd1=http://127.0.0.1:2380,etcd2=http://127.0.0.1:2381,etcd3=http://127.0.0.1:2382'
log_level = 'info'
ready_notify_timeout = 0

[[etcd_servers]]
name = 'etcd3'
dir = 'default.etcd3'
listen_client_urls = ['http://127.0.0.1:2377']
advertise_client_urls = ['http://127.0.0.1:2377']
listen_peer_urls = ['http://127.0.0.1:2382']
advertise_peer_urls = ['http://127.0.0.1:2382']
initial_cluster_token = 'ClusterToken'
initial_cluster = 'etcd1=http://127.0.0.1:2380,etcd2=http://127.0.0.1:2381,etcd3=http://127.0.0.1:2382'
log_level = 'info'
ready_notify_timeout = 0

[log]
add_stdout = true
add_stdout_in_debug = false
compress = false
file_name = 'log.log'
level = 'info'
max_age = 7
max_backups = 3
max_size = 1024000
set_slog = true
