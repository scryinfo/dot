[log]
file_name = "log.log"
max_size = 1024000
max_backups = 3
max_age = 7
compress = false
level = "info"
add_stdout = true
set_slog = true
[connect_server]
auto_run = true
addr = ":8090"
read_timeout = 0
write_timeout = 0
max_concurrent_streams = 100
allowed_origins = []
allow_headers = []
allow_methods = ["GET", "POST", "OPTIONS"]
allow_credentials = true
un_auth_urls = ["*"]
option_methods = true
shutdown_timeout = 1024000
http1 = true
http2 = true
unencrypted_http2 = true
[connect_server.tls]
mode = "secure"
cert = "../../config/cert/server.cert"
key = "../../config/cert/server.key"
root_cert = ""
peer_cert = ""
[hi_service]
name = "nobls_server"
